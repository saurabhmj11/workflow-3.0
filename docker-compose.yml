# ─── OpenWorkflow - Local Development with PostgreSQL ──────────
# Full stack: Next.js app + PostgreSQL
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f app    # Follow app logs
#   docker compose down           # Stop all services
#   docker compose down -v        # Stop and remove volumes (resets DB)
#
# The app will be available at http://localhost:3000
# PostgreSQL will be available at localhost:5432
# ───────────────────────────────────────────────────────────────

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://openworkflow:openworkflow@postgres:5432/openworkflow?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-openworkflow-dev-secret}
      - TRIGGERS_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openworkflow
      POSTGRES_PASSWORD: openworkflow
      POSTGRES_DB: openworkflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openworkflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
