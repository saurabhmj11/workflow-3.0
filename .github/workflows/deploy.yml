name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger

jobs:
  # Netlify deploys automatically on push via netlify.toml.
  # This job exists only to confirm the deploy was received by GitHub
  # and to surface any pre-deploy checks before Netlify picks up the commit.
  confirm:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Verify build (webpack, no Turbopack)
        run: npm run build
        env:
          # Minimal stubs so Next.js static gen doesn't crash without a real DB.
          # Netlify uses the real secrets set in its own environment variable panel.
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://stub:stub@localhost/stub' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-stub-secret-minimum-32-characters-x' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-stub-secret-minimum-32-characters-x' }}
          AUTH_URL: ${{ secrets.AUTH_URL || 'https://workflow-sl.netlify.app' }}
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deployment triggered
        run: |
          echo "✅ Build verified. Netlify deployment triggered automatically by this push."
          echo "   Monitor at: https://app.netlify.com/sites/workflow-sl/deploys"
