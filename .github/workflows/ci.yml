name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUN_VERSION: "latest"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: bun run test
        env:
          # Tests use mocked DB — no real connection needed
          DATABASE_URL: "postgresql://stub:stub@localhost/stub"
          AUTH_SECRET: "ci-stub-secret-minimum-32-characters-xx"
          NEXTAUTH_SECRET: "ci-stub-secret-minimum-32-characters-xx"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js (webpack)
        run: bun run build
        env:
          # Stub values so static generation doesn't crash without a real DB
          DATABASE_URL: "postgresql://stub:stub@localhost/stub"
          AUTH_SECRET: "ci-stub-secret-minimum-32-characters-xx"
          NEXTAUTH_SECRET: "ci-stub-secret-minimum-32-characters-xx"
          AUTH_URL: "https://workflow-sl.netlify.app"
          NEXT_TELEMETRY_DISABLED: "1"
